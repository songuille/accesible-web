<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Accesible — Accesibilidad en vivo para macOS.">
  <title>Accesible</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <noscript>
    <meta http-equiv="refresh" content="0; url=en/index.html">
    <a href="en/index.html">English</a>
  </noscript>

  <script>
    (function () {
      // Idioma guardado por el usuario (si ya eligió uno) o idioma del navegador.
      // Si no se reconoce, caemos a inglés.
      var supported = { es: "es", en: "en", fr: "fr", de: "de", eu: "eu", gl: "gl", ca: "ca" };
      var stored = null;
      try { stored = localStorage.getItem("accesible_lang"); } catch (e) {}

      var lang = stored;
      if (!lang) {
        var nav = (navigator.language || "").toLowerCase();
        var base = nav.split("-")[0];
        lang = supported[base] || "en";
      }

      window.location.replace(lang + "/index.html");
    })();
  </script>
</body>
</html>
