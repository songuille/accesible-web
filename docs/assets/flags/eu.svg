<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Euskara">
  <!-- Fondo rojo -->
  <rect width="100" height="100" fill="#D40000" rx="18" ry="18" />

  <!-- Cruz blanca (blanco opaco, sin interpretarse como transparente) -->
  <rect x="0" y="40" width="100" height="20" fill="#FFFFFF" fill-opacity="1" />
  <rect x="40" y="0" width="20" height="100" fill="#FFFFFF" fill-opacity="1" />

  <!-- Aspa verde -->
  <polygon points="0,15 15,0 100,85 85,100" fill="#009B48" />
  <polygon points="85,0 100,15 15,100 0,85" fill="#009B48" />
</svg>
